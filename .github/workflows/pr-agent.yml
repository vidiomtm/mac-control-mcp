name: PR-Agent

on:
  issue_comment:
    types: [created, edited]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  pr-agent:
    if: vars.ENABLE_PR_AGENT == 'true' && github.event.issue.pull_request != null
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install PR-Agent
        run: uv tool install pr-agent

      - name: Run PR-Agent
        env:
          OPENAI_KEY: ${{ secrets.LM_STUDIO_API_KEY }}
          OPENAI.API_BASE: http://localhost:1234/v1
          CONFIG.MODEL: openai/qwen3.6-27b-mlx
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uvx pr-agent --include "${{ github.event.comment.body }}" --pr_url "${{ github.event.issue.pull_request.html_url }}"
