name: Merge Gate

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: merge-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  format:
    name: Format Check
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff format check
        run: uvx ruff format --check .

  lint:
    name: Lint
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff lint
        run: uvx ruff check .

  typecheck:
    name: Type Check
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Pyright
        run: uvx pyright

  build:
    name: Build
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build package
        run: uv build

  unit:
    name: Unit Tests
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Tests with coverage gate
        run: uv run pytest --cov --cov-branch --cov-fail-under=90

  mutation:
    name: Mutation Tests
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Run mutation tests
        run: uv run mutmut run

  deadcode:
    name: Dead Code
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Vulture dead code detection
        run: uvx vulture src/ --min-confidence 80

  deps:
    name: Dependency Audit
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  semgrep:
    name: Semgrep Security
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default
          generateSarif: "1"

  sonarcloud:
    name: SonarCloud
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  required-checks:
    name: Required Checks (Merge)
    if: always() && (github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - format
      - lint
      - typecheck
      - build
      - unit
      - mutation
      - deadcode
      - deps
      - semgrep
      - sonarcloud
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.format.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.unit.result }}" != "success" ] || \
             [ "${{ needs.mutation.result }}" != "success" ] || \
             [ "${{ needs.deadcode.result }}" != "success" ] || \
             [ "${{ needs.deps.result }}" != "success" ] || \
             [ "${{ needs.semgrep.result }}" != "success" ] || \
             [ "${{ needs.sonarcloud.result }}" != "success" ]; then
            echo "One or more merge gate jobs failed."
            exit 1
          fi
          echo "All merge gate jobs passed."
